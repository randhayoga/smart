services:
    smart-app:
        container_name: smart-app
        restart: unless-stopped
        build:
            context: .
            dockerfile: docker/Dockerfile
        image: smart-app:frankenphp
        volumes:
            - .:/var/www/smart
            - ./docker/docker-php-size.ini:/usr/local/etc/php/conf.d/docker-php-size.ini
        ports:
            - "443:443"
            - "443:443/udp"
        depends_on:
            - db
        networks:
            - app-network

    db:
        image: "mcr.microsoft.com/mssql/server:2022-latest"
        container_name: db
        restart: unless-stopped
        volumes:
            - sqlvolume:/var/opt/mssql
        ports:
            - "1433:1433"
        environment:
            ACCEPT_EULA: Y
            MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
            MSSQL_PID: Developer
        healthcheck:
            test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P '$MSSQL_SA_PASSWORD' -C -Q 'SELECT 1'"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 60s
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    sqlvolume: